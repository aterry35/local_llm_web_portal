<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Local LLM Portal</title>
    <link rel="icon" href="/mark.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Conversations">
        <div class="brand">
          <img src="/mark.svg" alt="" class="brand-mark">
          <div>
            <div class="brand-title">Local LLM</div>
            <div class="brand-subtitle">Qwen portal</div>
          </div>
        </div>

        <button class="new-chat-button" id="newChatButton" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 5v14M5 12h14"></path>
          </svg>
          <span>New chat</span>
        </button>

        <nav class="conversation-list" id="conversationList" aria-label="Saved chats"></nav>
      </aside>

      <main class="chat-panel">
        <header class="topbar">
          <div class="model-heading">
            <div class="model-name">Qwen2.5 3B Instruct</div>
            <div class="model-endpoint" id="modelEndpoint">Checking endpoint</div>
          </div>

          <div class="status-group" aria-live="polite">
            <button class="icon-button" id="refreshHealthButton" type="button" aria-label="Refresh health" title="Refresh health">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M21 12a9 9 0 0 1-15.5 6.2M3 12A9 9 0 0 1 18.5 5.8"></path>
                <path d="M21 5v6h-6M3 19v-6h6"></path>
              </svg>
            </button>
            <div class="health-pill" id="healthPill">
              <span class="health-dot"></span>
              <span id="healthText">Checking</span>
            </div>
          </div>
        </header>

        <section class="messages" id="messages" aria-label="Chat messages"></section>

        <section class="composer-region" aria-label="Message composer">
          <div class="settings-row">
            <label class="setting-control">
              <span>Temperature</span>
              <input id="temperatureInput" type="range" min="0" max="1.2" step="0.1" value="0.3">
              <output id="temperatureValue">0.3</output>
            </label>

            <label class="setting-control tokens-control">
              <span>Max tokens</span>
              <input id="maxTokensInput" type="number" min="16" max="2048" step="16" value="512">
              <small id="tokenHint">Higher values can take several minutes on CPU.</small>
            </label>
          </div>

          <div class="attachment-tray" id="attachmentTray" aria-live="polite"></div>

          <form class="composer" id="composerForm">
            <input id="fileInput" type="file" multiple hidden>
            <button class="icon-button composer-tool" id="attachButton" type="button" aria-label="Attach files" title="Attach files">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M21.4 11.6 12 21a6 6 0 0 1-8.5-8.5l9.7-9.7a4.2 4.2 0 0 1 5.9 5.9l-9.8 9.8a2.4 2.4 0 0 1-3.4-3.4l8.8-8.8"></path>
              </svg>
            </button>
            <textarea id="promptInput" rows="1" placeholder="Message local Qwen"></textarea>
            <button class="send-button" id="sendButton" type="submit" aria-label="Send message" title="Send message">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M22 2 11 13"></path>
                <path d="m22 2-7 20-4-9-9-4Z"></path>
              </svg>
            </button>
          </form>
        </section>
      </main>
    </div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
